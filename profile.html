<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechyHub - Profile</title>
<link rel="stylesheet" href="css/style.css">
<script defer src="js/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================
   PROFILE PAGE — matches products/index/login design
================================================ */
:root {
  --bg-deep:     #050816;
  --bg-card:     rgba(10,15,40,0.85);
  --border-glow: rgba(99,102,241,0.28);
  --accent:      #6366f1;
  --accent2:     #38bdf8;
  --accent3:     #a78bfa;
  --text:        #e2e8f0;
  --muted:       #64748b;
  --danger:      #ef4444;
  --success:     #22c55e;
  --font-display:"Space Grotesk", sans-serif;
  --font-body:   "Inter", sans-serif;
  --radius:      16px;
  --transition:  .25s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#050816; }
::-webkit-scrollbar-thumb { background:var(--accent); border-radius:3px; }

/* ── NAVBAR ── */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 5%;
  background: rgba(5,8,22,.9);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(99,102,241,.18);
  position: sticky; top:0; z-index:200;
  box-shadow: 0 0 20px rgba(99,102,241,.1);
  flex-wrap: wrap;
  gap: 12px;
}
.logo {
  font-family: var(--font-display);
  font-size: 1.45rem;
  font-weight: 800;
  color: var(--accent3);
  letter-spacing: -.5px;
  text-shadow: 0 0 12px rgba(167,139,250,.4);
  display: flex; align-items:center; gap:8px;
}
.nav-links { display:flex; list-style:none; gap:24px; flex-wrap: wrap; }
.nav-links a {
  text-decoration:none; color:#94a3b8;
  font-size:.88rem; font-weight:500;
  transition: color var(--transition);
}
.nav-links a:hover { color:var(--accent3); }
.nav-auth { display:flex; align-items:center; gap:10px; }
.nav-profile-btn, .nav-login-btn {
  text-decoration:none; padding:8px 16px;
  border-radius:8px; font-weight:600; font-size:.82rem;
  transition: all var(--transition);
}
.nav-profile-btn {
  background: rgba(99,102,241,.18);
  color: var(--accent3);
  border: 1px solid rgba(99,102,241,.35);
}
.nav-login-btn {
  background: linear-gradient(135deg,#4f46e5,#7c3aed);
  color: white;
  box-shadow: 0 0 12px rgba(124,58,237,.4);
}
.nav-login-btn:hover { opacity:.88; }
#darkModeBtn {
  background:none; border:1px solid rgba(99,102,241,.3);
  color:var(--text); width:36px; height:36px;
  border-radius:8px; cursor:pointer; font-size:1rem;
  transition:all var(--transition);
}
#darkModeBtn:hover { background:rgba(99,102,241,.15); }

/* ── PAGE BACKGROUND ── */
.profile-bg {
  position: relative;
  min-height: calc(100vh - 72px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  overflow: hidden;
  background: url('images/hero-bg.jpg') center/cover no-repeat;
}
.profile-bg::before {
  content:"";
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(5,8,22,.9) 0%, rgba(20,8,50,.8) 50%, rgba(5,8,22,.9) 100%);
}
.profile-blob1 {
  position:absolute; width:480px; height:480px;
  background:radial-gradient(#7c3aed,transparent);
  filter:blur(130px); opacity:.25; top:-100px; right:-100px; pointer-events:none;
}
.profile-blob2 {
  position:absolute; width:360px; height:360px;
  background:radial-gradient(#2563eb,transparent);
  filter:blur(110px); opacity:.18; bottom:-80px; left:-80px; pointer-events:none;
}
.profile-blob3 {
  position:absolute; width:300px; height:300px;
  background:radial-gradient(#38bdf8,transparent);
  filter:blur(100px); opacity:.12; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none;
}

/* ── PROFILE CARD ── */
.profile-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 680px;
  animation: profileIn .55s cubic-bezier(.22,.68,0,1.18) both;
}
@keyframes profileIn {
  from { opacity:0; transform:translateY(30px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.profile-card {
  background: rgba(8,12,38,.92);
  border: 1px solid rgba(99,102,241,.35);
  border-radius: 24px;
  padding: 48px 44px 42px;
  text-align: center;
  box-shadow: 0 0 0 1px rgba(99,102,241,.1) inset, 0 0 60px rgba(99,102,241,.18), 0 24px 60px rgba(0,0,0,.55);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
}

/* Avatar layout and Camera triggers */
.profile-avatar-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 22px;
  cursor: pointer;
}
.profile-image {
  width: 120px; height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(99,102,241,.5);
  box-shadow: 0 0 0 6px rgba(99,102,241,.12), 0 0 30px rgba(99,102,241,.3);
  display: block;
}
.profile-avatar-ring {
  position: absolute; inset: -8px;
  border-radius: 50%; border: 2px solid transparent;
  background: linear-gradient(135deg,#6366f1,#38bdf8,#a78bfa) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out; mask-composite: exclude;
  animation: spinRing 6s linear infinite;
}
@keyframes spinRing { to { transform:rotate(360deg); } }

.profile-membership {
  position: absolute; bottom: 4px; left: -10px;
  background: linear-gradient(135deg,#f59e0b,#fbbf24);
  color: #000; font-size: .55rem; font-weight: 800;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 7px; border-radius: 50px;
  box-shadow: 0 0 10px rgba(251,191,36,.5);
}

/* Modern Hover/Active state overlay camera icon */
.camera-badge {
  position: absolute; inset: 0;
  background: rgba(5, 8, 22, 0.65);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; opacity: 0;
  transition: opacity var(--transition);
  border: 1px solid rgba(99,102,241,.5);
}
.edit-active .camera-badge {
  opacity: 1;
}

/* Custom Input Field Border Animations */
.profile-input {
  background: transparent; border: none;
  color: white; text-align: center; width: 100%;
  transition: all var(--transition);
}
.profile-input:focus { outline: none; }
.profile-input:not(:disabled) {
  background: rgba(99, 102, 241, 0.12) !important;
  border-bottom: 2px dashed var(--accent2) !important;
  padding: 4px 10px; border-radius: 8px;
}

/* stats */
.profile-stats {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 30px;
}
.stat-box {
  background: rgba(15,20,55,.7); border: 1px solid rgba(99,102,241,.25);
  border-radius: 14px; padding: 20px 14px; transition: all var(--transition);
}
.stat-box:hover {
  border-color: rgba(99,102,241,.55); box-shadow: 0 0 20px rgba(99,102,241,.2); transform: translateY(-3px);
}
.stat-box h2 {
  font-family: var(--font-display); font-size: 1.7rem; font-weight: 800;
  background: linear-gradient(135deg,var(--accent2),var(--accent3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 4px;
}
.stat-box p {
  font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .8px;
}

.profile-divider {
  height: 1px; background: linear-gradient(90deg,transparent,rgba(99,102,241,.3),transparent); margin-bottom: 26px;
}

/* action buttons */
.profile-actions { display: flex; flex-direction: column; gap: 11px; }
.profile-btn {
  width: 100%; padding: 13px; border: none; border-radius: 11px;
  font-family: var(--font-display); font-size: .9rem; font-weight: 700;
  cursor: pointer; transition: all var(--transition);
}
.profile-btn-primary {
  background: linear-gradient(135deg,#4f46e5,#7c3aed); color: white;
  box-shadow: 0 0 16px rgba(124,58,237,.35);
}
.profile-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 28px rgba(124,58,237,.55); }
.profile-btn-secondary {
  background: rgba(99,102,241,.1); color: var(--accent3); border: 1px solid rgba(99,102,241,.3);
}
.profile-btn-secondary:hover { background: rgba(99,102,241,.2); border-color: rgba(99,102,241,.55); transform: translateY(-2px); }
.logout-btn {
  width: 100%; padding: 13px; border: 1px solid rgba(239,68,68,.3); border-radius: 11px;
  background: rgba(239,68,68,.1); color: #ef4444; font-family: var(--font-display);
  font-size: .9rem; font-weight: 700; cursor: pointer; transition: all var(--transition);
}
.logout-btn:hover { background: #ef4444; color: white; box-shadow: 0 0 20px rgba(239,68,68,.4); transform: translateY(-2px); }

/* ── ORDER HISTORY MODAL ── */
.modal {
  display: none; position: fixed; inset:0; background: rgba(0,0,0,.82);
  backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; padding: 20px;
}
.modal.active { display: flex; }
.modal-content {
  background: rgba(8,12,38,.97); border: 1px solid rgba(99,102,241,.35);
  border-radius: 20px; padding: 34px; width: 90%; max-width: 650px; max-height: 82vh;
  overflow-y: auto; box-shadow: 0 0 50px rgba(99,102,241,.22); color: var(--text); animation: modalIn .28s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.94) translateY(16px); } to { opacity:1; transform:scale(1) translateY(0); } }

.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 22px; gap: 12px;
}
.modal-header h2 {
  font-family: var(--font-display); font-size: 1.4rem; font-weight: 800;
  background: linear-gradient(135deg,var(--accent2),var(--accent3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.modal-close-btn {
  background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
  color: var(--danger); width: 36px; height: 36px; border-radius: 9px;
  font-size: 1.1rem; cursor: pointer; transition: all var(--transition);
  flex-shrink: 0; line-height: 1;
}
.modal-close-btn:hover { background: var(--danger); color: white; }

.order-list { display: flex; flex-direction: column; gap: 14px; }
.order-item {
  background: rgba(15,20,55,.7); border: 1px solid rgba(99,102,241,.22);
  border-radius: 14px; padding: 16px 18px; transition: all var(--transition);
  display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px;
}
.order-item:hover { border-color: rgba(99,102,241,.5); box-shadow: 0 0 16px rgba(99,102,241,.15); }
.order-info { display: flex; flex-direction: column; gap: 4px; text-align: left; }
.order-id { font-family: var(--font-display); font-weight: 700; font-size: .95rem; color: var(--text); }
.order-date { font-size: .75rem; color: var(--muted); }
.order-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.order-total { font-family: var(--font-display); font-weight: 800; color: var(--accent2); font-size: 1rem; }
.order-status {
  font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
  padding: 4px 10px; border-radius: 50px;
}
.status-delivered { background: rgba(34,197,94,.15); color: var(--success); border: 1px solid rgba(34,197,94,.35); }
.status-pending   { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.35); }
.status-cancelled { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.35); }

.order-empty {
  text-align: center; color: var(--muted); font-size: .9rem; padding: 30px 10px;
}

/* ── FOOTER ── */
footer { text-align:center; padding:26px; background:rgba(5,8,22,.85); border-top:1px solid rgba(99,102,241,.15); color:var(--muted); font-size:.8rem; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .navbar { padding: 14px 4%; }
  .nav-links { display: none; }
  .profile-card { padding: 36px 26px 32px; }
  .profile-stats { gap: 10px; }
  .stat-box { padding: 16px 8px; }
  .stat-box h2 { font-size: 1.4rem; }
  .modal-content { padding: 24px 18px; }
}

@media (max-width: 480px) {
  .profile-bg { padding: 32px 12px; }
  .profile-card { padding: 30px 18px 26px; border-radius: 18px; }
  .profile-image { width: 96px; height: 96px; }
  .profile-input[id="profileNameField"] { font-size: 1.3rem !important; }
  .profile-stats { grid-template-columns: repeat(3,1fr); gap: 8px; }
  .stat-box h2 { font-size: 1.15rem; }
  .stat-box p { font-size: .6rem; }
  .order-item { flex-direction: column; align-items: flex-start; }
  .order-meta { width: 100%; justify-content: space-between; }
  .modal-header h2 { font-size: 1.15rem; }
}
</style>
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">
      <img src="images/techhublogo.jpg" alt="TechyHub Logo" style="height:36px;width:36px;object-fit:contain;border-radius:7px;">
      TechyHub
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="wishlist.html">Wishlist ❤️</a></li>
      <li><a href="cart.html">Cart 🛒 <span id="cartCount" style="background:#ef4444;color:white;border-radius:50%;padding:2px 7px;font-size:12px;">0</span></a></li>
    </ul>
    <div class="nav-auth">
      <a href="profile.html" class="nav-profile-btn">👤 Profile</a>
      <a href="login.html" class="nav-login-btn">Login</a>
    </div>
  </nav>
</header>

<div class="profile-bg">
  <div class="profile-blob1"></div><div class="profile-blob2"></div><div class="profile-blob3"></div>

  <div class="profile-wrapper">
    <div class="profile-card">

      <div class="profile-avatar-wrap" id="avatarContainer" onclick="triggerPhotoUpload()">
        <div class="profile-avatar-ring"></div>
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile Picture" class="profile-image" id="profileImageDisplay">
        <div class="camera-badge">📸</div>
        <span class="profile-membership">⭐ Gold</span>
        <input type="file" id="photoUploader" accept="image/*" style="display:none;" onchange="loadPreviewPhoto(event)">
      </div>

      <div style="margin-bottom: 30px;">
        <input type="text" id="profileNameField" class="profile-input" value="Guest User" disabled style="font-family: var(--font-display); font-size: 1.65rem; font-weight: 800;">
        <input type="email" id="profileEmailField" class="profile-input" value="Not logged in" disabled style="font-size: .85rem; color: var(--muted); margin-top: 5px;">
      </div>

      <div class="profile-stats">
        <div class="stat-box"><h2 id="ordersCount">0</h2><p>Orders</p></div>
        <div class="stat-box"><h2>0</h2><p>Wishlist</p></div>
        <div class="stat-box"><h2>Gold</h2><p>Membership</p></div>
      </div>

      <div class="profile-divider"></div>

      <div class="profile-actions">
        <button class="profile-btn profile-btn-primary" id="editTriggerBtn" onclick="toggleProfileEditState()">✏️ Edit Profile</button>
        <button class="profile-btn profile-btn-secondary" id="orderHistoryBtn" onclick="openOrderHistory()">🧾 Order History</button>
        <button class="logout-btn">🚪 Logout</button>
      </div>

    </div>
  </div>
</div>

<!-- ── ORDER HISTORY MODAL ── -->
<div class="modal" id="orderHistoryModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>🧾 Order History</h2>
      <button class="modal-close-btn" onclick="closeOrderHistory()">✕</button>
    </div>
    <div class="order-list" id="orderList">
      <!-- orders injected by JS -->
    </div>
  </div>
</div>

<footer><p>© 2026 TechyHub. All Rights Reserved.</p></footer>

<script>
// I-load ang mga dating nilagay ng user mula sa browser storage
document.addEventListener("DOMContentLoaded", () => {
    const savedName = localStorage.getItem("th_name");
    const savedEmail = localStorage.getItem("th_email");
    const savedPhoto = localStorage.getItem("th_photo");

    if (savedName) document.getElementById("profileNameField").value = savedName;
    if (savedEmail) document.getElementById("profileEmailField").value = savedEmail;
    if (savedPhoto) document.getElementById("profileImageDisplay").src = savedPhoto;

    renderOrderCount();
});

// Pinapahintulutan lang mag-click ng camera kung naka-edit mode
function triggerPhotoUpload() {
    const avatarWrapper = document.getElementById("avatarContainer");
    if (avatarWrapper.classList.contains("edit-active")) {
        document.getElementById("photoUploader").click();
    }
}

// Pagpapakita ng instant preview ng piniling file
function loadPreviewPhoto(event) {
    const file = event.target.files[0];
    if (file) {
        const fileReader = new FileReader();
        fileReader.onload = function(e) {
            document.getElementById("profileImageDisplay").src = e.target.result;
        };
        fileReader.readAsDataURL(file);
    }
}

// Ang mismong switch para sa Edit/Save states
function toggleProfileEditState() {
    const nameInput = document.getElementById("profileNameField");
    const emailInput = document.getElementById("profileEmailField");
    const actionBtn = document.getElementById("editTriggerBtn");
    const avatarWrapper = document.getElementById("avatarContainer");

    if (nameInput.hasAttribute("disabled")) {
        // LILIPAT SA EDIT MODE
        nameInput.removeAttribute("disabled");
        emailInput.removeAttribute("disabled");
        nameInput.focus();
        avatarWrapper.classList.add("edit-active"); 
        actionBtn.innerHTML = "💾 Save Changes";
        actionBtn.style.background = "linear-gradient(135deg, #22c55e, #16a34a)"; 
    } else {
        // LILIPAT SA SAVE MODE AT MAGTATAGO NG DATA
        nameInput.setAttribute("disabled", "true");
        emailInput.setAttribute("disabled", "true");
        avatarWrapper.classList.remove("edit-active"); 
        actionBtn.innerHTML = "✏️ Edit Profile";
        actionBtn.style.background = ""; 

        // Ise-save na sa localStorage memory ng gamit mong device
        localStorage.setItem("th_name", nameInput.value);
        localStorage.setItem("th_email", emailInput.value);
        
        const photoSrc = document.getElementById("profileImageDisplay").src;
        if (!photoSrc.includes("flaticon.com")) {
            localStorage.setItem("th_photo", photoSrc);
        }
        alert("Changes saved successfully!");
    }
}

/* ── ORDER HISTORY ── */

// Kunin ang mga orders mula sa localStorage (kung meron), gamitin ang key na "th_orders"
function getOrders() {
    try {
        const raw = localStorage.getItem("th_orders");
        if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed) && parsed.length) return parsed;
        }
    } catch (e) {
        console.warn("Could not parse th_orders:", e);
    }
    return [];
}

function renderOrderCount() {
    const orders = getOrders();
    const countEl = document.getElementById("ordersCount");
    if (countEl) countEl.textContent = orders.length;
}

function statusClass(status) {
    switch ((status || "").toLowerCase()) {
        case "delivered": return "status-delivered";
        case "cancelled": return "status-cancelled";
        default: return "status-pending";
    }
}

function openOrderHistory() {
    const orders = getOrders();
    const listEl = document.getElementById("orderList");
    listEl.innerHTML = "";

    if (orders.length === 0) {
        listEl.innerHTML = `<div class="order-empty">No orders yet. Start shopping to see your order history here! 🛍️</div>`;
    } else {
        orders.forEach(order => {
            const item = document.createElement("div");
            item.className = "order-item";
            item.innerHTML = `
                <div class="order-info">
                    <span class="order-id">#${order.id || "N/A"}</span>
                    <span class="order-date">${order.date || ""}</span>
                </div>
                <div class="order-meta">
                    <span class="order-total">₱${order.total || "0.00"}</span>
                    <span class="order-status ${statusClass(order.status)}">${order.status || "Pending"}</span>
                </div>
            `;
            listEl.appendChild(item);
        });
    }

    document.getElementById("orderHistoryModal").classList.add("active");
    document.body.style.overflow = "hidden";
}

function closeOrderHistory() {
    document.getElementById("orderHistoryModal").classList.remove("active");
    document.body.style.overflow = "";
}

// Isara ang modal kung click sa labas ng content
document.getElementById("orderHistoryModal").addEventListener("click", function(e) {
    if (e.target === this) closeOrderHistory();
});

// Isara gamit ang ESC key
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeOrderHistory();
});
</script>
</body>
</html>
