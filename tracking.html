<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechyHub - Order Tracking</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="images/techhublogo.jpg" alt="TechyHub Logo" style="height:38px;width:38px;object-fit:contain;border-radius:8px;vertical-align:middle;margin-right:8px;">TechyHub
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="tracking.html" class="active">Tracking</a></li>
            <li><a href="wishlist.html">Wishlist ❤️</a></li>
            <li><a href="cart.html">Cart 🛒 <span id="cartCount" style="background:red;color:white;border-radius:50%;padding:2px 7px;font-size:12px;">0</span></a></li>
        </ul>
        <div class="nav-auth">
            <a href="profile.html" class="nav-profile-btn">👤 Profile</a>
            <a href="login.html" class="nav-login-btn">Login</a>
        </div>
        <button id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>
    </nav>
</header>

<section class="tracking-page">

    <h1>🚚 Order Tracking</h1>
    <p>Enter the Order ID you received after checkout to track your order.</p>

    <div class="tracking-form">
        <input
            type="text"
            id="trackingNumber"
            placeholder="Enter Order ID (e.g. #TH-100001)"
        >
        <button onclick="trackOrder()">Track Order</button>
    </div>

    <div id="trackingResult"></div>

    <!-- Shows the user's past orders pulled from localStorage -->
    <div id="myOrdersSection" style="margin-top:40px;display:none;">
        <h3>🧾 Your Recent Orders</h3>
        <table class="sku-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Product(s)</th>
                    <th>Status</th>
                    <th>Quick Track</th>
                </tr>
            </thead>
            <tbody id="myOrdersBody"></tbody>
        </table>
    </div>

</section>

<footer>
    <p>© 2026 TechyHub. All Rights Reserved.</p>
</footer>

<button id="topBtn" onclick="scrollToTop()">↑</button>

<script>
// ─── STATUS PROGRESSION ───────────────────────────────────────
const steps = [
    "Processing 📦",
    "Shipped ✈️",
    "Out for Delivery 🚚",
    "Delivered ✅"
];

const statusColors = {
    "Processing 📦":       "#f97316",
    "Shipped ✈️":          "#38bdf8",
    "Out for Delivery 🚚": "#4ade80",
    "Delivered ✅":        "#a78bfa"
};

// ─── LOAD USER'S ORDERS FROM LOCALSTORAGE ─────────────────────
function getOrders() {
    return JSON.parse(localStorage.getItem("techyhub_orders") || "{}");
}

// ─── SHOW RECENT ORDERS TABLE ────────────────────────────────
function loadMyOrders() {
    const orders = getOrders();
    const keys   = Object.keys(orders);
    if (keys.length === 0) return;

    const section = document.getElementById("myOrdersSection");
    const tbody   = document.getElementById("myOrdersBody");
    section.style.display = "block";

    tbody.innerHTML = keys.map(id => {
        const o           = orders[id];
        const productList = o.items ? o.items.map(i => i.name).join(", ") : o.product || "Order";
        return `
            <tr>
                <td><strong>#${id}</strong></td>
                <td>${productList}</td>
                <td>${o.status}</td>
                <td>
                    <button onclick="quickTrack('${id}')" style="
                        background:#38bdf8;color:#0f172a;border:none;
                        padding:4px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.8rem;">
                        Track
                    </button>
                </td>
            </tr>`;
    }).join("");
}

// ─── QUICK TRACK FROM TABLE ───────────────────────────────────
function quickTrack(id) {
    document.getElementById("trackingNumber").value = "#" + id;
    trackOrder();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─── TRACK ORDER FUNCTION ─────────────────────────────────────
function trackOrder() {
    const raw       = document.getElementById("trackingNumber").value.trim().toUpperCase();
    const resultDiv = document.getElementById("trackingResult");

    if (!raw) {
        resultDiv.innerHTML = '<p style="color:orange;margin-top:16px;">⚠️ Please enter your Order ID.</p>';
        return;
    }

    // Strip leading # if user typed it
    const id     = raw.startsWith("#") ? raw.slice(1) : raw;
    const orders = getOrders();
    const order  = orders[id];

    if (!order) {
        resultDiv.innerHTML = `
            <div style="margin-top:20px;padding:16px;border:2px solid #ef4444;border-radius:10px;background:#1a0000;">
                <p style="color:#ef4444;">❌ Order ID <strong>#${id}</strong> was not found.</p>
                <p style="color:#94a3b8;font-size:0.85rem;margin-top:6px;">
                    Please check the Order ID from your checkout confirmation and try again.
                </p>
            </div>`;
        return;
    }

    const color       = statusColors[order.status] || "#e2e8f0";
    const currentStep = steps.indexOf(order.status);
    const productList = order.items ? order.items.map(i => `${i.name}${i.qty > 1 ? ' x'+i.qty : ''}`).join(", ") : order.product;

    const stepHTML = steps.map((step, idx) => {
        const done    = idx <= currentStep;
        const current = idx === currentStep;
        return `
            <div style="display:flex;align-items:center;gap:10px;margin:8px 0;">
                <span style="font-size:1.1rem;">${done ? "✅" : "⬜"}</span>
                <span style="
                    color:${done ? color : "#4b5563"};
                    font-weight:${current ? "700" : "400"};
                    font-size:${current ? "1rem" : "0.9rem"};
                ">${step}${current ? " ← Current" : ""}</span>
            </div>`;
    }).join("");

    resultDiv.innerHTML = `
        <div style="
            margin-top:24px;
            padding:22px;
            border:2px solid ${color};
            border-radius:14px;
            background:#0f172a;
            box-shadow:0 0 18px ${color}33;
        ">
            <h3 style="color:${color};margin-bottom:6px;">📦 ${productList}</h3>
            <p style="color:#94a3b8;margin-bottom:4px;font-size:0.85rem;">
                Order ID: <strong style="color:#e2e8f0;">#${id}</strong>
            </p>
            ${order.date ? `<p style="color:#64748b;font-size:0.8rem;margin-bottom:4px;">Placed on: ${order.date}</p>` : ""}
            ${order.total ? `<p style="color:#64748b;font-size:0.8rem;margin-bottom:12px;">Total: <strong style="color:#e2e8f0;">${order.total}</strong></p>` : ""}
            <p style="margin-bottom:18px;">
                Status: <strong style="color:${color};">${order.status}</strong>
            </p>
            <hr style="border-color:#1e293b;margin-bottom:14px;">
            <p style="color:#64748b;font-size:0.8rem;margin-bottom:10px;">ORDER PROGRESS</p>
            ${stepHTML}
        </div>`;
}

// Allow Enter key
document.getElementById("trackingNumber").addEventListener("keydown", function(e) {
    if (e.key === "Enter") trackOrder();
});

// Load past orders on page load
loadMyOrders();
</script>

</body>
</html>
