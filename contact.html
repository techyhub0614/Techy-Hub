<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechyHub - Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e0e6f0;
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10, 14, 22, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 180, 255, 0.15);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            text-decoration: none;
        }

        .logo img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: cover;
        }

        .logo span {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.35rem;
            letter-spacing: 0.06em;
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168,85,247,0.5);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 0.2rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: rgba(200,220,255,0.7);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.35rem 0.65rem;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
            text-transform: uppercase;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #00b4ff;
            background: rgba(0,180,255,0.08);
        }

        #darkModeBtn {
            background: none;
            border: 1px solid rgba(0,180,255,0.3);
            color: #00b4ff;
            border-radius: 6px;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        #darkModeBtn:hover { background: rgba(0,180,255,0.1); }

        /* ── HERO / BACKGROUND ── */
        .contact-page {
            min-height: 100vh;
            padding-top: 60px;
        }

        .contact-hero {
            width: 100%;
            min-height: calc(100vh - 60px);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem 4rem;
            background-image: url('desmumtz15.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .contact-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(4, 8, 18, 0.62);
            z-index: 0;
        }

        .contact-hero > * { position: relative; z-index: 1; }

        /* ── HEADING — centered like Evolve ── */
        .contact-heading {
            text-align: center;
            margin-bottom: 2.8rem;
        }

        .contact-heading h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.1em;
            text-shadow: 0 0 40px rgba(0,180,255,0.4), 0 2px 12px rgba(0,0,0,0.7);
            margin-bottom: 0.7rem;
        }

        .contact-heading p {
            font-size: 1rem;
            color: rgba(200,225,255,0.75);
            font-weight: 300;
            letter-spacing: 0.03em;
        }

        /* ── EVOLVE-STYLE CENTERED FORM PANEL ── */
        .contact-form-panel {
            width: 100%;
            max-width: 660px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Two-column name row */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 1.6rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Evolve-style label: small caps, spaced, gold-toned → here: blue accent */
        .form-group label {
            font-family: 'Inter', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: #00b4ff;
            text-transform: uppercase;
        }

        /* Evolve-style input: light semi-transparent fill, no radius, clean bottom border feel */
        .contact-input {
            background: rgba(220, 235, 255, 0.10);
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.25);
            border-radius: 0;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            padding: 0.75rem 0.6rem;
            outline: none;
            width: 100%;
            transition: border-color 0.25s, background 0.25s;
        }

        .contact-input::placeholder {
            color: rgba(200,220,255,0.35);
            font-style: italic;
        }

        .contact-input:focus {
            border-bottom-color: #00b4ff;
            background: rgba(0,180,255,0.07);
        }

        .contact-textarea {
            resize: none;
            min-height: 120px;
            line-height: 1.6;
        }

        /* Full-width fields below name row */
        .form-group-full {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.6rem;
        }

        .form-group-full label {
            font-family: 'Inter', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: #00b4ff;
            text-transform: uppercase;
        }

        /* Centered wide button — Evolve style */
        .form-submit-wrap {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .contact-submit {
            background: linear-gradient(135deg, #005fa3 0%, #0099e6 100%);
            border: none;
            border-radius: 4px;
            color: #ffffff;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            padding: 1rem 3.5rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
            box-shadow: 0 4px 28px rgba(0,153,230,0.35);
        }

        .contact-submit:hover {
            opacity: 0.88;
            box-shadow: 0 6px 36px rgba(0,180,255,0.55);
            transform: translateY(-2px);
        }

        .contact-submit:active { transform: translateY(0); }

        /* ── MAP ── */
        .contact-map {
            width: 100%;
            max-width: 660px;
            margin-top: 2.5rem;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(0,180,255,0.2);
            box-shadow: 0 0 30px rgba(0,180,255,0.08);
            filter: brightness(0.8) saturate(0.6) hue-rotate(185deg);
        }

        /* ── FOOTER ── */
        footer {
            background: rgba(5,10,18,0.95);
            border-top: 1px solid rgba(0,180,255,0.1);
            text-align: center;
            padding: 1.2rem;
            font-size: 0.78rem;
            color: rgba(140,165,200,0.6);
            letter-spacing: 0.06em;
        }

        /* ── SCROLL TOP BTN ── */
        #topBtn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0,180,255,0.15);
            border: 1px solid rgba(0,180,255,0.4);
            color: #00b4ff;
            border-radius: 8px;
            width: 42px;
            height: 42px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 99;
            transition: background 0.2s, box-shadow 0.2s;
        }

        #topBtn:hover {
            background: rgba(0,180,255,0.25);
            box-shadow: 0 0 16px rgba(0,180,255,0.3);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .form-row .form-group { margin-bottom: 1.4rem; }
            .nav-links { display: none; }
            .contact-submit { padding: 1rem 2rem; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="images/techyhub-logo.png" alt="TechyHub Logo">
            <span>TechyHub</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="tracking.html">Tracking</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="wishlist.html">Wishlist ❤️</a></li>
            <li><a href="cart.html">Cart 🛒 <span id="cartCount" style="background:#00b4ff;color:#0d1117;border-radius:50%;padding:2px 7px;font-size:11px;font-weight:700;">0</span></a></li>
        </ul>
        <button id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>
    </nav>
</header>

<section class="contact-page">
    <div class="contact-hero">

        <div class="contact-heading">
            <h1>Contact Us</h1>
            <p>Drop us a line — we'll get back to you Monday–Friday.</p>
        </div>

        <!-- Evolve-style centered form -->
        <div class="contact-form-panel">

            <!-- First Name / Last Name row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input id="fname" type="text" placeholder="Juan" class="contact-input">
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input id="lname" type="text" placeholder="dela Cruz" class="contact-input">
                </div>
            </div>

            <div class="form-group-full">
                <label for="email">Email Address</label>
                <input id="email" type="email" placeholder="juan@email.com" class="contact-input">
            </div>

            <div class="form-group-full">
                <label for="msg">Message</label>
                <textarea id="msg" rows="5" placeholder="Type your message here..." class="contact-input contact-textarea"></textarea>
            </div>

            <div class="form-submit-wrap">
                <button class="contact-submit" onclick="submitContact()">Send Message</button>
            </div>

        </div>

        <!-- MAP STRIP -->
        <div class="contact-map">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d123950.58290897483!2d121.02183!3d14.6760!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3397b0e6f1aaf5c5%3A0x6e9c7bda3a0e36e4!2sQuezon%20City%2C%20Metro%20Manila!5e0!3m2!1sen!2sph!4v1700000000000"
                width="100%" height="200"
                style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 TechyHub. All Rights Reserved.</p>
</footer>

<button id="topBtn" onclick="scrollToTop()">↑</button>

</body>
</html>
